name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgomp1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify core package imports
        run: |
          python -c "import pandas, numpy, flask, streamlit, sklearn, joblib; print('Core imports successful')"

      - name: Verify project package imports
        run: |
          python -c "import src; print('src package import successful')"

      - name: Build Docker image
        run: |
          docker build -t demand-forecast-platform .